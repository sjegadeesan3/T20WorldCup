<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Match Scorecard — T20 World Cup 2026</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Scorecard Page Specific Styles ── */
    .sc-page { max-width: 900px; margin: 0 auto; padding: 24px 20px 60px; }

    .sc-back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--card); color: var(--text-muted);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 16px; font-size: 14px; cursor: pointer;
      text-decoration: none; transition: all 0.2s;
      margin-bottom: 24px;
    }
    .sc-back-btn:hover { color: var(--gold); border-color: var(--gold); }

    /* Match Header */
    .sc-header {
      background: linear-gradient(135deg, var(--card) 0%, var(--card2) 100%);
      border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 28px 32px; margin-bottom: 24px;
    }
    .sc-match-type {
      font-size: 12px; font-weight: 600; letter-spacing: 1px;
      color: var(--gold); text-transform: uppercase; margin-bottom: 8px;
    }
    .sc-match-name {
      font-family: var(--font-title); font-size: 22px; font-weight: 700;
      color: var(--text); margin-bottom: 16px;
    }
    .sc-teams-summary {
      display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    }
    .sc-team-block { text-align: center; flex: 1; min-width: 120px; }
    .sc-team-name-big {
      font-family: var(--font-title); font-size: 18px; font-weight: 700;
      color: var(--text); display: block; margin-bottom: 6px;
    }
    .sc-team-score-big {
      font-family: var(--font-title); font-size: 28px; font-weight: 700;
      color: var(--gold);
    }
    .sc-team-overs { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .sc-vs { font-family: var(--font-title); font-size: 20px; color: var(--text-muted); }
    .sc-status-row {
      margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .sc-status-badge {
      font-size: 12px; font-weight: 700; padding: 4px 10px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .sc-badge-live { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .sc-badge-result { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
    .sc-badge-upcoming { background: rgba(255,215,0,0.15); color: var(--gold); border: 1px solid rgba(255,215,0,0.3); }
    .sc-status-text { font-size: 14px; color: var(--text-muted); }
    .sc-venue { font-size: 13px; color: var(--text-muted); }

    /* Innings Section */
    .sc-innings {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); margin-bottom: 20px; overflow: hidden;
    }
    .sc-innings-header {
      background: var(--card2); padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .sc-innings-title {
      font-family: var(--font-title); font-size: 16px; font-weight: 700; color: var(--text);
    }
    .sc-innings-total {
      font-family: var(--font-title); font-size: 20px; font-weight: 700; color: var(--gold);
    }
    .sc-innings-overs { font-size: 13px; color: var(--text-muted); margin-left: 8px; }

    /* Tables */
    .sc-table-wrap { overflow-x: auto; }
    .sc-table {
      width: 100%; border-collapse: collapse;
      font-size: 13.5px;
    }
    .sc-table th {
      background: rgba(255,255,255,0.04); color: var(--text-muted);
      font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
      padding: 10px 14px; text-align: left; white-space: nowrap;
    }
    .sc-table th.num { text-align: right; }
    .sc-table td {
      padding: 11px 14px; color: var(--text); border-bottom: 1px solid rgba(255,255,255,0.05);
      white-space: nowrap;
    }
    .sc-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .sc-table tr:last-child td { border-bottom: none; }
    .sc-table tr:hover td { background: rgba(255,255,255,0.03); }

    .sc-batter-name { font-weight: 600; color: var(--text); }
    .sc-dismissal { font-size: 12px; color: var(--text-muted); display: block; margin-top: 2px; }
    .sc-highlight { color: var(--gold); font-weight: 700; }
    .sc-not-out { color: var(--green); font-weight: 600; }

    .sc-extras-row td { color: var(--text-muted); font-size: 13px; background: rgba(255,255,255,0.02); }
    .sc-total-row td { font-weight: 700; background: rgba(255,215,0,0.05); color: var(--gold); }

    /* Bowling */
    .sc-bowling-wrap { padding: 0; }

    /* Fall of Wickets */
    .sc-fow {
      padding: 14px 20px 16px; border-top: 1px solid var(--border);
    }
    .sc-fow-title {
      font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 10px;
    }
    .sc-fow-list {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .sc-fow-item {
      background: var(--card2); border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 10px; font-size: 12.5px; color: var(--text-muted);
    }
    .sc-fow-item strong { color: var(--text); }

    /* Loading & Error */
    .sc-loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 80px 20px; gap: 16px;
    }
    .sc-spinner {
      width: 44px; height: 44px; border: 3px solid var(--border);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sc-loading-text { color: var(--text-muted); font-size: 15px; }

    .sc-error {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius); padding: 20px 24px; text-align: center;
      color: #ef4444;
    }

    .sc-no-scorecard {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 40px 24px; text-align: center;
      color: var(--text-muted);
    }
    .sc-no-scorecard .sc-nc-icon { font-size: 40px; margin-bottom: 12px; }
    .sc-no-scorecard p { font-size: 15px; }

    /* Section divider label */
    .sc-section-label {
      padding: 10px 24px 0;
      font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--text-muted);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .sc-header { padding: 20px 18px; }
      .sc-innings-header { padding: 14px 16px; }
      .sc-table th, .sc-table td { padding: 9px 10px; }
      .sc-match-name { font-size: 17px; }
      .sc-team-score-big { font-size: 22px; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <div class="nav-logo">
        <span class="logo-icon">🏏</span>
        <span>ICC T20 World Cup <strong>2026</strong></span>
      </div>
      <ul class="nav-links">
        <li><a href="index.html#match">Match</a></li>
        <li><a href="index.html#squads">Squads</a></li>
        <li><a href="index.html#stats">Stats</a></li>
        <li><a href="index.html#journey">Journey</a></li>
        <li><a href="index.html#stadium">Stadium</a></li>
        <li><a href="index.html#live" class="nav-live-link"><span class="live-dot small"></span> Live Scores</a></li>
        <li><a href="index.html#venue">Venue</a></li>
      </ul>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">☰</button>
    </div>
    <div class="nav-mobile" id="navMobile">
      <a href="index.html#match">Match</a>
      <a href="index.html#squads">Squads</a>
      <a href="index.html#stats">Stats</a>
      <a href="index.html#journey">Journey</a>
      <a href="index.html#stadium">Stadium</a>
      <a href="index.html#live">🔴 Live Scores</a>
      <a href="index.html#venue">Venue</a>
    </div>
  </nav>

  <div class="sc-page" id="scPage">
    <a href="index.html#live" class="sc-back-btn">← Back to Live Scores</a>
    <div id="scContent">
      <div class="sc-loading">
        <div class="sc-spinner"></div>
        <div class="sc-loading-text">Loading scorecard…</div>
      </div>
    </div>
  </div>

  <script>
    // ── Nav toggle ──
    const navToggle = document.getElementById('navToggle');
    const navMobile = document.getElementById('navMobile');
    navToggle.addEventListener('click', () => {
      navMobile.classList.toggle('open');
      navToggle.textContent = navMobile.classList.contains('open') ? '✕' : '☰';
    });
    navMobile.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        navMobile.classList.remove('open');
        navToggle.textContent = '☰';
      });
    });

    // ── Constants ──
    const CRICAPI_BASE = 'https://api.cricapi.com/v1';
    const LS_KEY = 'cricapi_key';
    const DEFAULT_KEY = 'd19a69d5-f828-4b49-8cc4-9a73f970c598';

    const scContent = document.getElementById('scContent');

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    // ── Get match ID from URL ──
    const params = new URLSearchParams(window.location.search);
    const matchId = params.get('id');

    if (!matchId) {
      scContent.innerHTML = `<div class="sc-error">No match ID provided. <a href="index.html#live" style="color:var(--gold)">Go back to Live Scores</a></div>`;
    } else {
      const apiKey = localStorage.getItem(LS_KEY) || DEFAULT_KEY;
      loadScorecard(matchId, apiKey);
    }

    async function loadScorecard(id, apiKey) {
      try {
        const url = `${CRICAPI_BASE}/match_scorecard?apikey=${encodeURIComponent(apiKey)}&id=${encodeURIComponent(id)}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (data.status !== 'success' || !data.data) {
          // Fallback: try basic match info
          const basicUrl = `${CRICAPI_BASE}/match_info?apikey=${encodeURIComponent(apiKey)}&id=${encodeURIComponent(id)}`;
          const res2 = await fetch(basicUrl);
          if (!res2.ok) throw new Error(`HTTP ${res2.status}`);
          const data2 = await res2.json();
          if (data2.status !== 'success' || !data2.data) {
            throw new Error(data.status || data2.status || 'API error');
          }
          renderBasicInfo(data2.data);
          return;
        }
        renderScorecard(data.data);
      } catch (err) {
        scContent.innerHTML = `<div class="sc-error">⚠️ Failed to load scorecard: ${escHtml(err.message)}.<br><br><a href="index.html#live" style="color:var(--gold)">← Return to Live Scores</a></div>`;
      }
    }

    function renderScorecard(match) {
      const isLive = match.matchStarted && !match.matchEnded;
      const isUpcoming = !match.matchStarted;
      const teams = match.teams || [];

      // Build status badge
      let badgeClass = 'sc-badge-result', badgeText = 'Completed';
      if (isUpcoming) { badgeClass = 'sc-badge-upcoming'; badgeText = 'Upcoming'; }
      else if (isLive) { badgeClass = 'sc-badge-live'; badgeText = '● LIVE'; }

      // Build teams header summary
      const scores = match.score || [];
      let teamsSummaryHTML = '';
      if (teams.length >= 2) {
        teams.forEach((team, idx) => {
          const scoreObj = scores.find(s => s.inning && s.inning.startsWith(team));
          const scoreText = scoreObj ? `${scoreObj.r ?? 0}/${scoreObj.w ?? 0}` : (match.matchStarted ? '—/—' : 'TBD');
          const overs = scoreObj && scoreObj.o ? `(${scoreObj.o} ov)` : '';
          if (idx === 1) teamsSummaryHTML += `<span class="sc-vs">vs</span>`;
          teamsSummaryHTML += `
            <div class="sc-team-block">
              <span class="sc-team-name-big">${escHtml(team)}</span>
              <div class="sc-team-score-big">${escHtml(scoreText)}</div>
              <div class="sc-team-overs">${escHtml(overs)}</div>
            </div>`;
        });
      }

      const matchType = match.matchType ? match.matchType.toUpperCase() : 'CRICKET';
      const statusText = match.status || (isUpcoming ? `Starts ${match.date || 'soon'}` : 'Result pending');
      const venue = match.venue || '';
      const matchDate = match.date ? `📅 ${match.date}` : '';

      // Build scorecard innings
      const scorecard = match.scorecard || [];
      let inningsHTML = '';

      if (scorecard.length === 0) {
        inningsHTML = `
          <div class="sc-no-scorecard">
            <div class="sc-nc-icon">🏏</div>
            <p>${isUpcoming ? 'Match has not started yet. Scorecard will appear once the match begins.' : 'Detailed scorecard not available for this match.'}</p>
          </div>`;
      } else {
        scorecard.forEach(innings => {
          inningsHTML += buildInningsHTML(innings);
        });
      }

      document.title = `${escHtml(match.name || teams.join(' vs '))} — Scorecard`;

      scContent.innerHTML = `
        <div class="sc-header">
          <div class="sc-match-type">${escHtml(matchType)}${match.series_id ? '' : ''}</div>
          <div class="sc-match-name">${escHtml(match.name || teams.join(' vs '))}</div>
          <div class="sc-teams-summary">${teamsSummaryHTML}</div>
          <div class="sc-status-row">
            <span class="sc-status-badge ${badgeClass}">${badgeText}</span>
            <span class="sc-status-text">${escHtml(statusText)}</span>
          </div>
          ${venue ? `<div class="sc-venue" style="margin-top:10px">📍 ${escHtml(venue)}${matchDate ? '  &nbsp;' + escHtml(matchDate) : ''}</div>` : (matchDate ? `<div class="sc-venue" style="margin-top:10px">${escHtml(matchDate)}</div>` : '')}
        </div>
        ${inningsHTML}`;
    }

    function buildInningsHTML(innings) {
      const battingList = innings.batting || [];
      const bowlingList = innings.bowling || [];
      const fowList = innings.fow || [];
      const inningName = innings.inning || 'Innings';
      const r = innings.r ?? '—';
      const w = innings.w ?? '—';
      const o = innings.o ?? '';

      // Batting rows
      let battingRows = '';
      battingList.forEach(b => {
        const sr = b.sr != null ? parseFloat(b.sr).toFixed(1) : '—';
        const isNotOut = b.dismissal_text && (b.dismissal_text.toLowerCase() === 'not out' || b.dismissal_text.toLowerCase() === 'batting');
        battingRows += `
          <tr>
            <td>
              <span class="sc-batter-name ${isNotOut ? 'sc-not-out' : ''}">${escHtml(b.batsman || b.name || '—')}</span>
              <span class="sc-dismissal">${escHtml(b.dismissal_text || '')}</span>
            </td>
            <td class="num ${b.r >= 50 ? 'sc-highlight' : ''}">${b.r ?? '—'}</td>
            <td class="num">${b.b ?? '—'}</td>
            <td class="num">${b['4s'] ?? b.fours ?? '—'}</td>
            <td class="num">${b['6s'] ?? b.sixes ?? '—'}</td>
            <td class="num">${sr}</td>
          </tr>`;
      });

      // Extras & Total
      const extras = innings.extras != null ? innings.extras : (innings.e ?? null);
      const extrasBreakdown = innings.extras_text || '';

      // Bowling rows
      let bowlingRows = '';
      bowlingList.forEach(bwlr => {
        const econ = bwlr.eco != null ? parseFloat(bwlr.eco).toFixed(2) : '—';
        const hasFiveFor = (bwlr.w ?? 0) >= 5;
        bowlingRows += `
          <tr>
            <td class="sc-batter-name">${escHtml(bwlr.bowler || bwlr.name || '—')}</td>
            <td class="num">${bwlr.o ?? '—'}</td>
            <td class="num">${bwlr.m ?? '—'}</td>
            <td class="num">${bwlr.r ?? '—'}</td>
            <td class="num ${hasFiveFor ? 'sc-highlight' : ''}">${bwlr.w ?? '—'}</td>
            <td class="num">${econ}</td>
          </tr>`;
      });

      // Fall of wickets
      let fowHTML = '';
      if (fowList.length > 0) {
        const items = fowList.map(f =>
          `<span class="sc-fow-item"><strong>${escHtml(String(f.score || f.r || '?'))}</strong>-${f.w ?? '?'} (${escHtml(f.player || f.batsman || '?')}, ${f.over ? f.over + ' ov' : '?'})</span>`
        ).join('');
        fowHTML = `
          <div class="sc-fow">
            <div class="sc-fow-title">Fall of Wickets</div>
            <div class="sc-fow-list">${items}</div>
          </div>`;
      }

      return `
        <div class="sc-innings">
          <div class="sc-innings-header">
            <span class="sc-innings-title">${escHtml(inningName)}</span>
            <span>
              <span class="sc-innings-total">${r}/${w}</span>
              ${o ? `<span class="sc-innings-overs">(${o} ov)</span>` : ''}
            </span>
          </div>
          ${battingRows ? `
          <div class="sc-section-label">Batting</div>
          <div class="sc-table-wrap">
            <table class="sc-table">
              <thead>
                <tr>
                  <th>Batter</th>
                  <th class="num">R</th>
                  <th class="num">B</th>
                  <th class="num">4s</th>
                  <th class="num">6s</th>
                  <th class="num">SR</th>
                </tr>
              </thead>
              <tbody>
                ${battingRows}
                ${extras != null ? `<tr class="sc-extras-row"><td colspan="3">Extras ${extrasBreakdown ? '(' + escHtml(extrasBreakdown) + ')' : ''}</td><td class="num" colspan="3">${extras}</td></tr>` : ''}
                <tr class="sc-total-row"><td colspan="3"><strong>Total</strong></td><td class="num" colspan="3"><strong>${r}/${w}${o ? ' (' + o + ' ov)' : ''}</strong></td></tr>
              </tbody>
            </table>
          </div>` : ''}
          ${bowlingRows ? `
          <div class="sc-section-label" style="margin-top:16px">Bowling</div>
          <div class="sc-table-wrap sc-bowling-wrap">
            <table class="sc-table">
              <thead>
                <tr>
                  <th>Bowler</th>
                  <th class="num">O</th>
                  <th class="num">M</th>
                  <th class="num">R</th>
                  <th class="num">W</th>
                  <th class="num">Econ</th>
                </tr>
              </thead>
              <tbody>${bowlingRows}</tbody>
            </table>
          </div>` : ''}
          ${fowHTML}
        </div>`;
    }

    function renderBasicInfo(match) {
      // Render a simpler view when only basic info is available
      const isLive = match.matchStarted && !match.matchEnded;
      const isUpcoming = !match.matchStarted;
      const teams = match.teams || [];
      const scores = match.score || [];

      let badgeClass = 'sc-badge-result', badgeText = 'Completed';
      if (isUpcoming) { badgeClass = 'sc-badge-upcoming'; badgeText = 'Upcoming'; }
      else if (isLive) { badgeClass = 'sc-badge-live'; badgeText = '● LIVE'; }

      let teamsSummaryHTML = '';
      teams.forEach((team, idx) => {
        const scoreObj = scores.find(s => s.inning && s.inning.startsWith(team));
        const scoreText = scoreObj ? `${scoreObj.r ?? 0}/${scoreObj.w ?? 0}` : (match.matchStarted ? '—/—' : 'TBD');
        const overs = scoreObj && scoreObj.o ? `(${scoreObj.o} ov)` : '';
        if (idx === 1) teamsSummaryHTML += `<span class="sc-vs">vs</span>`;
        teamsSummaryHTML += `
          <div class="sc-team-block">
            <span class="sc-team-name-big">${escHtml(team)}</span>
            <div class="sc-team-score-big">${escHtml(scoreText)}</div>
            <div class="sc-team-overs">${escHtml(overs)}</div>
          </div>`;
      });

      const statusText = match.status || (isUpcoming ? `Starts ${match.date || 'soon'}` : 'Result pending');
      const matchType = match.matchType ? match.matchType.toUpperCase() : 'CRICKET';

      scContent.innerHTML = `
        <div class="sc-header">
          <div class="sc-match-type">${escHtml(matchType)}</div>
          <div class="sc-match-name">${escHtml(match.name || teams.join(' vs '))}</div>
          <div class="sc-teams-summary">${teamsSummaryHTML}</div>
          <div class="sc-status-row">
            <span class="sc-status-badge ${badgeClass}">${badgeText}</span>
            <span class="sc-status-text">${escHtml(statusText)}</span>
          </div>
          ${match.venue ? `<div class="sc-venue" style="margin-top:10px">📍 ${escHtml(match.venue)}</div>` : ''}
        </div>
        <div class="sc-no-scorecard">
          <div class="sc-nc-icon">📋</div>
          <p>Detailed ball-by-ball scorecard is not available for this match via the free API tier.<br><br>Showing match summary above.</p>
        </div>`;
    }
  </script>
</body>
</html>
